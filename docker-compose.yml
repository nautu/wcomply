version: "3.9"

services:

  mongodb:
    image: mongo:7
    container_name: vulntrack_mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - vulntrack_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: vulntrack_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      mongodb:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - SECRET_KEY=${SECRET_KEY:-change_me_in_production}
    networks:
      - vulntrack_net

volumes:
  mongo_data:
    driver: local

networks:
  vulntrack_net:
    driver: bridge
